<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Pulse rings -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#3b82f6" stroke-width="0.6" opacity="0.15"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#3b82f6" stroke-width="0.6" opacity="0.22"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#3b82f6" stroke-width="0.7" opacity="0.35"/>

  <!-- K8 text -->
  <text
    x="50" y="66"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    fill="url(#glow)"
    text-anchor="middle"
    letter-spacing="-1"
  >K8</text>

  <!-- Heartbeat dot -->
  <circle cx="50" cy="50" r="2.5" fill="#3b82f6" opacity="0.7"/>
</svg>
